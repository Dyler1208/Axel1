<!DOCTYPE html>
<html>
<head>
<title>Iris Species Predictor</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    text-align: center;
    min-height: 100vh;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
}

.container{
    background: rgba(255,255,255,0.95);
    width: 450px;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}

h2 {
    color: #333;
    margin-bottom: 30px;
    font-size: 28px;
}

.form-group {
    margin-bottom: 15px;
    text-align: left;
}

label {
    display: block;
    font-weight: bold;
    color: #555;
    margin-bottom: 5px;
    font-size: 14px;
}

input[type="text"], input[type="number"] {
    width: 100%;
    padding: 12px;
    margin-bottom: 8px;
    border: 2px solid #ddd;
    border-radius: 5px;
    font-size: 14px;
    box-sizing: border-box;
    transition: border-color 0.3s;
}

input[type="text"]:focus, input[type="number"]:focus {
    outline: none;
    border-color: #667eea;
}

button {
    width: 100%;
    padding: 12px 20px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
    transition: transform 0.2s, box-shadow 0.2s;
    margin-top: 20px;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
}

button:active {
    transform: translateY(0);
}

.species-list {
    background: #f8f9fa;
    padding: 20px;
    border-radius: 10px;
    margin: 20px 0;
    text-align: center;
}

.species-list h3 {
    color: #333;
    margin-top: 0;
    margin-bottom: 15px;
}

.species-list ul {
    list-style: none;
    padding: 0;
    margin: 0;
}

.species-list li {
    display: inline-block;
    background: white;
    padding: 8px 15px;
    margin: 5px;
    border-radius: 20px;
    border: 2px solid #667eea;
    color: #667eea;
    font-weight: 500;
}

.prediction-result {
    margin-top: 30px;
    padding: 20px;
    background: #f0f4ff;
    border-left: 4px solid #667eea;
    border-radius: 5px;
    min-height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.prediction-result h3 {
    margin: 0;
    color: #667eea;
    font-size: 18px;
}

.prediction-result.success {
    background: #d4edda;
    border-left-color: #28a745;
}

.prediction-result.success h3 {
    color: #28a745;
}

</style>

</head>

<body>

<div class="container">

<h2>🌸 Iris Flower Prediction</h2>

<form method="post" action="{{ url_for('predict') }}">

<div class="form-group">
    <label for="sepal_length">Sepal Length (cm)</label>
    <input type="number" step="0.1" id="sepal_length" name="sepal_length" placeholder="e.g., 5.1" required>
</div>

<div class="form-group">
    <label for="sepal_width">Sepal Width (cm)</label>
    <input type="number" step="0.1" id="sepal_width" name="sepal_width" placeholder="e.g., 3.5" required>
</div>

<div class="form-group">
    <label for="petal_length">Petal Length (cm)</label>
    <input type="number" step="0.1" id="petal_length" name="petal_length" placeholder="e.g., 1.4" required>
</div>

<div class="form-group">
    <label for="petal_width">Petal Width (cm)</label>
    <input type="number" step="0.1" id="petal_width" name="petal_width" placeholder="e.g., 0.2" required>
</div>

<button type="submit">Predict Iris Species</button>

</form>

<div class="species-list">
    <h3>Iris Species Classes</h3>
    <ul>
      <li>Iris Setosa</li>
      <li>Iris Versicolor</li>
      <li>Iris Virginica</li>
    </ul>
</div>

<div class="prediction-result">
    {% if prediction_text %}
        <h3 class="success">✓ {{ prediction_text }}</h3>
    {% else %}
        <h3>Enter values and click "Predict" to see results</h3>
    {% endif %}
</div>

</div>

</body>
</html>
